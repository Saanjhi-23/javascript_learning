<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bg-black{
            background-color: black;
            color: aliceblue;
        }
    </style>
</head>
<body class="bg-black">
    <ul class="language">
        <li>javascript</li>
    </ul>
</body>
<script>
    function addLang(lname){
        const li =document.createElement("li");
        li.innerHTML=`${lname}`
        document.querySelector('.language').appendChild(li)
    }
    addLang("python")
    addLang("php")

    //second method which more optimize , because , in first
    //  method it has to traverse whole tree then wee are able 
    // to add new child
    
    function addolang(lname){
        const li =document.createElement("li");
        li.appendChild(document.createTextNode(lname))
        document.querySelector('.language').appendChild(li)

    }
    addolang('golang')

    //edit
    const update=document.querySelector('li:nth-child(2)')
    const newli = document.createElement('li')
    newli.textContent="mojo"
    update.replaceWith(newli)

    //edit 2
    const firstlang = document.querySelector('li:first-child')
    firstlang.outerHTML='<li>Java</li>'

    //remove
    const lastlang=document.querySelector('li:last-child')
    lastlang.remove()

</script>
